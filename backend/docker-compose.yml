services:
  postgres:
    image: postgres:18-alpine
    container_name: wc_chatbot_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: ${PG_DATA}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - postgres_data:${PG_DATA}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wc_chatbot_network
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wc_chatbot_pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN4_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN4_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wc_chatbot_network
  
  api:
    build: .
    env_file: .env
    container_name: wc_chatbot_api
    ports:
      - "8000:8000"
    environment:
      SQLALCHEMY_DATABASE_URL: ${SQLALCHEMY_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wc_chatbot_network

volumes:
  postgres_data:

networks:
  wc_chatbot_network:
    driver: bridge